name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: spark
          POSTGRES_PASSWORD: spark
          POSTGRES_DB: tenegta_spark
        ports:
          - 5435:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://spark:spark@localhost:5435/tenegta_spark
      NEXTAUTH_SECRET: ci-test-secret
      NEXTAUTH_URL: http://localhost:3000
      RATE_LIMIT_INTERNAL_SECRET: ci-rate-limit
      CRON_SECRET: ci-cron
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Prisma migrate
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run db:seed

      - name: Unit tests
        run: npm run test

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: E2E critical paths
        run: npx playwright test --grep-invert "visual audit"
        env:
          CI: true
          DISABLE_LOGIN_RATE_LIMIT: "1"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
